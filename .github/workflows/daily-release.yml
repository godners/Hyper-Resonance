name: "[WORKFLOW] Daily Release"
# .github/workflows/daily-release.yml

on:
  schedule:
    - cron: '00 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-release:
    runs-on: self-hosted

    steps:
      - name: "[STEP] Run Checkout Repository via Action"
        id: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: "[STEP] Run Worker (Check) via Command"
        id: worker-check
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          LASTEST_SHA=$(git rev-parse "$LATEST_TAG^{commit}" 2>/dev/null || echo "")
          CURRENT_SHA=$(git rev-parse HEAD)
          if [ "$LASTEST_SHA" = "$CURRENT_SHA" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi        

      - name: "[STEP] Print Summary (NO Changes) via Command"
        id: summary-nochange
        if: steps.worker-check.outputs.has_changes == 'false'
        shell: bash
        run: |
          TIME="$(date '+%F %T') (UTC)"
          TITLE="Daily Release"
          MESSAGE="Release Canceled because No Changes."
          SUMMARY="[${TITLE}] ${TIME}: ${MESSAGE}"
          echo "${SUMMARY}" >> $GITHUB_STEP_SUMMARY
          echo "${SUMMARY}"
          echo "summary=${SUMMARY}" >> $GITHUB_OUTPUT

      - name: "[STEP] Run Worker (Info) via Command"
        id: worker-info
        shell: bash
        run: |
          TODAY=$(date '+%Y.%m.%d')
          TAG="${TODAY}.auto"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          TIME=$(date '+%F %T')
          echo "time=${TIME} (UTC)" >> $GITHUB_OUTPUT
      
      - name: "[STEP] Remove Existent Release via Command"
        id: remove
        if: steps.worker-check.outputs.has_changes == 'true'
        shell: bash
        run: gh release delete ${{ steps.worker-info.outputs.tag }} --yes --cleanup-tag 2>/dev/null || echo ""
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: "[STEP] Create New Release via Action"
        id: create
        if: steps.worker-check.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{ steps.worker-info.outputs.tag }}
          name: ${{ steps.worker-info.outputs.tag }}
          body: |
            - TAG: ${{ steps.worker-info.outputs.tag }}
            - TIME: ${{ steps.worker-info.outputs.time }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "[STEP] Print Summary (Has Changes) via Command"
        id: summary-haschanges
        if: steps.worker-check.outputs.has_changes == 'true'
        shell: bash
        run: |
          TIME="$(date '+%F %T') (UTC)"
          TITLE="Daily Release"
          MESSAGE="Tag is <${{ steps.worker-info.outputs.tag }}>, Time is <${{ steps.worker-info.outputs.time }}>."
          SUMMARY="[${TITLE}] ${TIME}: ${MESSAGE}"
          echo "${SUMMARY}" >> $GITHUB_STEP_SUMMARY
          echo "${SUMMARY}"
          echo "summary=${SUMMARY}" >> $GITHUB_OUTPUT

